<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d7ef7"/>
      <stop offset="100%" stop-color="#4d5ee0"/>
    </linearGradient>
    <linearGradient id="check" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Check pintado (pincelada) -->
  <path d="M138 272 L218 352 L344 206" fill="none" stroke="url(#check)" stroke-width="54" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Rolo de tinta na ponta do traço longo (local +x = direção do traço, ~-49°) -->
  <g transform="translate(346 204) rotate(-49)">
    <!-- cilindro: eixo longo perpendicular ao movimento -->
    <rect x="-30" y="-64" width="60" height="128" rx="26" fill="#fff"/>
    <rect x="-15" y="-48" width="30" height="96" rx="13" fill="#4d5ee0"/>
    <!-- braço do cabo saindo da ponta inferior do cilindro, atrás do movimento -->
    <rect x="-72" y="57" width="56" height="14" rx="7" fill="#fff"/>
    <!-- empunhadura em L -->
    <rect x="-72" y="57" width="14" height="62" rx="7" fill="#fff"/>
  </g>
</svg>
