<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#5b7fff"/>
  <rect width="512" height="512" rx="96" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b9fff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3a5bdf;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Paint roller body -->
  <rect x="148" y="138" width="216" height="80" rx="20" fill="#fff" opacity="0.95"/>
  <rect x="148" y="138" width="216" height="80" rx="20" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- Roller head -->
  <rect x="148" y="138" width="148" height="80" rx="20" fill="#fff"/>
  <rect x="170" y="158" width="104" height="40" rx="10" fill="#5b7fff"/>
  <!-- Handle vertical -->
  <rect x="336" y="178" width="28" height="140" rx="14" fill="#fff" opacity="0.95"/>
  <!-- Handle horizontal grip -->
  <rect x="248" y="290" width="116" height="28" rx="14" fill="#fff" opacity="0.95"/>
  <!-- Paint trail -->
  <rect x="148" y="238" width="148" height="36" rx="8" fill="#ffd60a" opacity="0.9"/>
  <rect x="148" y="286" width="148" height="24" rx="8" fill="#ffd60a" opacity="0.65"/>
  <rect x="148" y="322" width="148" height="16" rx="8" fill="#ffd60a" opacity="0.35"/>
</svg>
