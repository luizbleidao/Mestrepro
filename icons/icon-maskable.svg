<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable: fill full square, content inside 80% safe zone (102px padding each side) -->
  <rect width="512" height="512" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b9fff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3a5bdf;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Safe zone starts at ~102,102 — all content within 308x308 centered area -->
  <!-- Paint roller body -->
  <rect x="148" y="148" width="216" height="72" rx="18" fill="#fff" opacity="0.95"/>
  <!-- Roller head (paint color) -->
  <rect x="148" y="148" width="144" height="72" rx="18" fill="#fff"/>
  <rect x="168" y="166" width="104" height="36" rx="9" fill="#5b7fff"/>
  <!-- Handle vertical -->
  <rect x="336" y="180" width="28" height="120" rx="14" fill="#fff" opacity="0.95"/>
  <!-- Handle horizontal grip -->
  <rect x="248" y="272" width="116" height="28" rx="14" fill="#fff" opacity="0.95"/>
  <!-- Paint trail -->
  <rect x="148" y="240" width="144" height="32" rx="7" fill="#ffd60a" opacity="0.9"/>
  <rect x="148" y="282" width="144" height="22" rx="7" fill="#ffd60a" opacity="0.6"/>
  <rect x="148" y="314" width="144" height="14" rx="7" fill="#ffd60a" opacity="0.3"/>
</svg>
