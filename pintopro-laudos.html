<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="theme-color" content="#5b7fff">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MestrePro — Laudos Técnicos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="pp-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#111827;--blue:#1A56A0;--blue2:#2563EB;--sky:#EEF3FA;--sky2:#DDE8F7;
  --green:#16A34A;--amber:#D97706;--red:#DC2626;--purple:#9333EA;
  --txt:#1E2A3A;--sub:#5A6A7E;--border:#C8D8EE;--white:#fff;
  --r:10px;--r2:6px;--sh:0 2px 12px rgba(13,46,107,.10);
  --font:'DM Sans',sans-serif;--hfont:'Rajdhani',sans-serif;
}
html,body{height:100%;background:var(--sky);font-family:var(--font);color:var(--txt);font-size:14px;line-height:1.5;-webkit-tap-highlight-color:transparent}
#app{min-height:100vh;display:flex;flex-direction:column}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,textarea,select{font-family:var(--font);outline:none}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);color:#fff;padding:13px 16px 11px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.hdr-row{display:flex;align-items:center;gap:10px}
.hdr-logo{font-family:var(--hfont);font-size:20px;font-weight:700;letter-spacing:.5px;flex:1}
.hdr-logo span{opacity:.7;font-size:13px;font-weight:500;display:block;letter-spacing:.3px}
.hdr-btns{display:flex;gap:6px}
.hdr-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:var(--r2);padding:6px 10px;font-size:12px;transition:.2s}
.hdr-btn:hover{background:rgba(255,255,255,.25)}

/* STEPS */
.steps-bar{background:var(--navy);padding:0 16px 12px;display:flex;gap:4px}
.step-dot{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.2);transition:.3s}
.step-dot.done{background:rgba(255,255,255,.6)}
.step-dot.active{background:#fff}

/* CONTENT */
.content{padding:16px;flex:1;max-width:640px;width:100%;margin:0 auto}

/* CARD */
.card{background:#fff;border-radius:var(--r);border:1px solid var(--border);padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.card-title{font-family:var(--hfont);font-size:17px;font-weight:700;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.card-title .ico{width:28px;height:28px;border-radius:var(--r2);background:var(--sky2);display:flex;align-items:center;justify-content:center;font-size:14px}

/* FORM */
.lbl{font-size:10px;font-weight:600;letter-spacing:.6px;color:var(--sub);text-transform:uppercase;margin-bottom:4px;display:block}
.inp{width:100%;border:1.5px solid var(--border);border-radius:var(--r2);padding:9px 11px;font-size:14px;color:var(--txt);transition:.2s;background:#fff}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,160,.12)}
textarea.inp{resize:vertical;min-height:80px;line-height:1.6}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.mt{margin-top:12px}
.divider{border:none;border-top:1px solid var(--sky2);margin:14px 0}

/* TOGGLES */
.tog-group{display:flex;flex-wrap:wrap;gap:6px}
.tog{border:1.5px solid var(--border);background:#fff;color:var(--sub);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:500;transition:.2s}
.tog.on{border-color:var(--blue);background:var(--sky2);color:var(--blue);font-weight:600}

/* NBR */
.nbr-grid{display:grid;grid-template-columns:1fr;gap:5px}
.nbr-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:.2s;font-size:12px;color:var(--sub);background:#fff}
.nbr-item.on{border-color:var(--blue);background:var(--sky2);color:var(--blue)}
.nbr-check{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:.2s}
.nbr-item.on .nbr-check{background:var(--blue);border-color:var(--blue);color:#fff}

/* SUBSTRATE CHECKLIST */
.subst-check{background:#FEF9C3;border:1px solid #FDE68A;border-radius:var(--r2);padding:10px 12px;margin-bottom:12px}
.subst-check-title{font-size:11px;font-weight:700;color:#92400E;letter-spacing:.4px;margin-bottom:7px;text-transform:uppercase}
.subst-check-item{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:#78350F;padding:3px 0;cursor:pointer}
.subst-check-item input{margin-top:2px;accent-color:#D97706;flex-shrink:0}

/* PATOLOGIA CARD */
.pat-card{border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:.2s;background:#fff}
.pat-card.sel{border-color:var(--blue);background:#FAFCFF}
.pat-header{padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:10px}
.pat-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:.2s}
.pat-card.sel .pat-check{background:var(--blue);border-color:var(--blue);color:#fff}
.pat-info{flex:1}
.pat-nome{font-weight:600;font-size:13.5px;color:var(--txt)}
.pat-cat{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;letter-spacing:.3px}
.pat-badges{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap}
.pat-body{padding:0 13px 13px;display:none}
.pat-card.open .pat-body{display:block}
.pat-own{background:#EEF4FB;border:1px solid #C3D9F0;border-radius:var(--r2);padding:9px 11px;margin-bottom:10px;font-size:12px;color:var(--blue);line-height:1.6}
.pat-own strong{display:block;font-size:9px;font-weight:700;letter-spacing:.5px;color:#1A56A0;margin-bottom:3px;text-transform:uppercase}
.grav-row{display:flex;gap:6px;margin-bottom:8px}
.gbtn{flex:1;border:1.5px solid var(--border);background:#fff;border-radius:20px;padding:6px 0;font-size:12px;font-weight:500;color:var(--sub);transition:.2s}
.gbtn.lv.on{border-color:var(--green);background:#DCFCE7;color:var(--green);font-weight:700}
.gbtn.mo.on{border-color:var(--amber);background:#FEF3C7;color:var(--amber);font-weight:700}
.gbtn.gr.on{border-color:var(--red);background:#FEE2E2;color:var(--red);font-weight:700}
.nota-inp{width:100%;border:1.5px solid var(--border);border-radius:var(--r2);padding:8px 10px;font-size:12px;color:var(--txt);background:#fff;transition:.2s;margin-bottom:8px}
.nota-inp:focus{border-color:var(--blue)}

/* CUSTO ESTIMADO */
.custo-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:var(--r2);padding:7px 10px}
.custo-lbl{font-size:10px;font-weight:700;letter-spacing:.4px;color:var(--green);text-transform:uppercase;white-space:nowrap}
.custo-inp{flex:1;border:none;background:transparent;font-size:13px;color:var(--txt);padding:2px 4px}
.custo-hint{font-size:10px;color:var(--sub)}

/* PHOTO IN CARD */
.pat-photos{margin-bottom:8px}
.pat-photos-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
.pat-photo-add{width:72px;height:58px;border:1.5px dashed var(--border);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--sub);font-size:10px;gap:2px;transition:.2s;background:var(--sky);flex-shrink:0}
.pat-photo-add:hover{border-color:var(--blue);background:var(--sky2);color:var(--blue)}
.pat-photo-add .ico2{font-size:18px}
.pat-photo-thumb{position:relative;flex-shrink:0}
.pat-photo-thumb img{width:72px;height:58px;object-fit:cover;border-radius:6px;border:1px solid var(--border);display:block}
.pat-photo-del{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:var(--red);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1.5px solid #fff}
.pat-photo-leg{width:72px;font-size:9px;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--sub);padding:2px 0;text-align:center;margin-top:2px}

/* DETAIL BTN */
.detail-btn{width:100%;border:1.5px solid var(--sky2);background:var(--sky);color:var(--blue);border-radius:var(--r2);padding:7px;font-size:12px;font-weight:600;transition:.2s;display:flex;align-items:center;justify-content:center;gap:5px}
.detail-btn:hover{background:var(--sky2)}
.detail-panel{display:none;margin-top:8px}
.detail-panel.open{display:block}
.passo-box{background:#F0F7FF;border:1px solid #BFDBFE;border-radius:var(--r2);padding:10px;margin-bottom:8px}
.passo-tit{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--blue);margin-bottom:8px;text-transform:uppercase}
.passo-item{display:flex;gap:8px;margin-bottom:7px;align-items:flex-start}
.passo-num{width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.passo-txt{font-size:12px;color:var(--txt);line-height:1.5}
.prods-box{background:#F0FDF4;border:1px solid #BBF7D0;border-radius:var(--r2);padding:10px}
.prods-tit{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--green);margin-bottom:8px;text-transform:uppercase}
.prods-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.prod-marca{font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--green);margin-bottom:5px;text-transform:uppercase}
.prod-item{font-size:11px;color:var(--txt);padding:3px 0;border-bottom:1px solid #D1FAE5;line-height:1.4}
.prod-item:last-child{border-bottom:none}

/* NAV */
.nav{display:flex;gap:10px;padding:14px 0 6px}
.btn-primary{flex:1;background:linear-gradient(135deg,var(--blue),var(--navy));color:#fff;border-radius:var(--r2);padding:13px;font-size:14px;font-weight:600;font-family:var(--hfont);letter-spacing:.5px;transition:.2s}
.btn-primary:hover{opacity:.9}
.btn-sec{flex:1;background:#fff;color:var(--blue);border:1.5px solid var(--border);border-radius:var(--r2);padding:12px;font-size:14px;font-weight:600;font-family:var(--hfont);transition:.2s}
.btn-sec:hover{background:var(--sky)}
.btn-green{background:linear-gradient(135deg,#15803D,#16A34A);color:#fff;border-radius:var(--r2);padding:13px;font-size:14px;font-weight:600;font-family:var(--hfont);letter-spacing:.5px;transition:.2s;width:100%}
.btn-danger{background:#FEE2E2;color:var(--red);border:1px solid #FECACA;border-radius:var(--r2);padding:8px 14px;font-size:12px;font-weight:600;transition:.2s}
.btn-danger:hover{background:#FCA5A5;color:#fff}

/* HOME */
.home-banner{background:linear-gradient(135deg,var(--navy),var(--blue));border-radius:var(--r);padding:18px 16px;margin-bottom:14px;color:#fff}
.home-banner h2{font-family:var(--hfont);font-size:22px;font-weight:700;margin-bottom:3px}
.home-banner p{font-size:12px;opacity:.8}
.home-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.action-btn{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:14px 12px;text-align:center;cursor:pointer;transition:.2s;box-shadow:var(--sh)}
.action-btn:hover{border-color:var(--blue);background:var(--sky)}
.action-btn .ico{font-size:22px;margin-bottom:6px}
.action-btn .lbl2{font-size:13px;font-weight:600;color:var(--txt)}
.action-btn .desc{font-size:11px;color:var(--sub);margin-top:2px}
.laudo-item{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:8px;cursor:pointer;transition:.2s;box-shadow:var(--sh);display:flex;align-items:center;gap:12px}
.laudo-item:hover{border-color:var(--blue);transform:translateY(-1px)}
.laudo-icon{width:40px;height:40px;border-radius:var(--r2);background:var(--sky2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.laudo-info{flex:1}
.laudo-num{font-family:var(--hfont);font-size:15px;font-weight:700;color:var(--navy)}
.laudo-cli{font-size:12px;color:var(--sub);margin-top:1px}
.laudo-meta{display:flex;gap:6px;margin-top:4px;align-items:center;flex-wrap:wrap}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;letter-spacing:.3px}
.badge-green{background:#DCFCE7;color:var(--green)}
.badge-amber{background:#FEF3C7;color:var(--amber)}
.badge-blue{background:var(--sky2);color:var(--blue)}
.laudo-wa{background:none;border:none;color:#25D366;font-size:15px;cursor:pointer;padding:4px 2px;flex-shrink:0}
.laudo-del{color:#CBD5E1;font-size:16px;padding:4px 8px;background:none;transition:.2s}
.laudo-del:hover{color:var(--red)}
.empty-state{text-align:center;padding:32px 16px;color:var(--sub)}
.empty-state .ico{font-size:40px;margin-bottom:10px}

/* ACOMPANHAMENTO */
.followup-item{background:var(--sky);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px;margin-bottom:7px}
.followup-date{font-size:11px;font-weight:700;color:var(--navy)}
.followup-obs{font-size:12px;color:var(--txt);margin-top:3px;line-height:1.5}
.followup-photos{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.followup-photo{width:60px;height:48px;object-fit:cover;border-radius:4px;border:1px solid var(--border)}

/* PIN */


/* ARQUIVO */
.drop-zone{border:2px dashed var(--border);border-radius:var(--r);padding:24px;text-align:center;cursor:pointer;transition:.2s;color:var(--sub)}
.drop-zone:hover,.drop-zone.drag{border-color:var(--blue);background:var(--sky)}
.arq-list{margin-top:10px;display:flex;flex-direction:column;gap:7px}
.arq-item{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--border);border-radius:var(--r2);padding:9px 11px}
.arq-thumb{width:38px;height:38px;border-radius:5px;object-fit:cover;flex-shrink:0}
.arq-ico{width:38px;height:38px;border-radius:5px;background:var(--sky2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.arq-info{flex:1;min-width:0}
.arq-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.arq-leg{font-size:11px;border:none;border-bottom:1px solid var(--border);background:transparent;width:100%;color:var(--sub);padding:2px 0;margin-top:2px}
.arq-del{color:#CBD5E1;background:none;font-size:14px;flex-shrink:0;padding:3px 6px;transition:.2s}
.ai-analisar-btn{width:100%;padding:8px;border:1px dashed #7C3AED;border-radius:8px;background:#FAF5FF;color:#6D28D9;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px;transition:.2s}
.ai-analisar-btn:hover{background:#EDE9FE}
.ai-analisar-btn:disabled{opacity:.5;cursor:not-allowed}
.ai-result-box{background:#F5F3FF;border:1px solid #DDD6FE;border-radius:8px;padding:10px 12px;margin-top:6px;font-size:12px;color:#3730A3;line-height:1.6}
.ai-result-box .ai-titulo{font-size:11px;font-weight:700;color:#6D28D9;letter-spacing:.5px;margin-bottom:6px}
.arq-del:hover{color:var(--red)}

/* TÉCNICO */
.tec-field{margin-bottom:14px}
.tec-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.tec-lbl{font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--sub);text-transform:uppercase}
.btn-gerar{background:var(--sky2);color:var(--blue);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:10px;font-weight:700;letter-spacing:.3px;transition:.2s}
.btn-gerar:hover{background:var(--blue);color:#fff}

/* PREVIEW */
.preview-sec{margin-bottom:14px}
.preview-sec-head{background:var(--navy);color:#fff;padding:7px 12px;border-radius:var(--r2) var(--r2) 0 0;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.preview-sec-body{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r2) var(--r2);padding:11px 12px;font-size:12px;line-height:1.8;color:var(--txt);white-space:pre-line;background:#fff}
.crit-badge{display:inline-block;border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;letter-spacing:.5px}
.crit-CRITICO{background:#FEE2E2;color:var(--red)}
.crit-RELEVANTE{background:#FEF3C7;color:var(--amber)}
.crit-MODERADO{background:#DCFCE7;color:var(--green)}

/* ASSINATURA */
.sig-wrap{border:1.5px solid var(--border);border-radius:var(--r2);background:#fff;overflow:hidden;margin-bottom:8px;position:relative}
#sig-canvas{display:block;width:100%;touch-action:none;cursor:crosshair}
.sig-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--sub);pointer-events:none}
.sig-actions{display:flex;gap:8px}
.sig-clear{background:var(--sky);border:1px solid var(--border);color:var(--sub);border-radius:var(--r2);padding:7px 14px;font-size:12px;font-weight:600}

/* FINALIZAÇÃO */
.fin-overlay{position:fixed;inset:0;background:#111827;z-index:999;display:none;flex-direction:column;overflow-y:auto}
.fin-overlay.open{display:flex}
.fin-hdr{background:linear-gradient(135deg,var(--navy),var(--blue));padding:20px 20px 16px;color:#fff;text-align:center}
.fin-hdr h2{font-family:var(--hfont);font-size:24px;font-weight:700;margin-bottom:3px}
.fin-saved{background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;font-size:13px;font-weight:600}
.fin-saved .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.6);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.fin-body{flex:1;padding:16px;max-width:600px;width:100%;margin:0 auto}
.fin-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:var(--r);padding:16px;margin-bottom:12px;color:#fff}
.fin-card h3{font-family:var(--hfont);font-size:20px;font-weight:700;margin-bottom:8px}
.fin-stat-row{display:flex;gap:8px;margin-bottom:14px}
.fin-stat{flex:1;border-radius:var(--r2);padding:10px;text-align:center;background:rgba(255,255,255,.1)}
.fin-stat .num{font-family:var(--hfont);font-size:20px;font-weight:700;color:#fff}
.fin-stat .lbl3{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.7)}
.fin-btns{display:flex;flex-direction:column;gap:8px;padding:0 16px 20px;max-width:600px;width:100%;margin:0 auto}
.fin-btn1{background:#fff;color:var(--blue);border-radius:var(--r2);padding:14px;font-size:15px;font-weight:700;font-family:var(--hfont);letter-spacing:.5px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
.fin-btn2{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:var(--r2);padding:12px;font-size:14px;font-weight:600;font-family:var(--hfont);width:100%;display:flex;align-items:center;justify-content:center;gap:6px}
.fin-btn-wa{background:#25D366;color:#fff;border-radius:10px;padding:13px;font-size:14px;font-weight:700;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer}
.fin-btn3{background:transparent;color:rgba(255,255,255,.6);font-size:12px;padding:8px;width:100%;display:flex;align-items:center;justify-content:center;gap:5px}

/* CONSULTA */
.cq-search{position:relative;margin-bottom:12px}
.cq-search input{width:100%;border:1.5px solid var(--border);border-radius:24px;padding:11px 16px 11px 40px;font-size:14px;background:#fff;transition:.2s}
.cq-search input:focus{border-color:var(--blue)}
.cq-search .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--sub)}
.cq-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--sh);cursor:pointer;transition:.2s}
.cq-card:hover{border-color:var(--blue)}
.cq-head{display:flex;align-items:center;gap:10px;padding:11px 13px}
.cq-body{display:none;padding:0 13px 13px;border-top:1px solid var(--sky2)}
.cq-body.open{display:block}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:14px 14px 0 0;padding:20px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:var(--hfont);font-size:18px;font-weight:700;color:var(--navy);margin-bottom:14px}
.modal-actions{display:flex;gap:8px;margin-top:14px}

/* INFO/WARN */
.info-box{background:var(--sky2);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px;font-size:12px;color:var(--blue);line-height:1.5;margin-bottom:12px}
.warn-box{background:#FEF3C7;border:1px solid #FDE68A;border-radius:var(--r2);padding:10px 12px;font-size:12px;color:#92400E;line-height:1.5;margin-bottom:12px}

/* TOAST */
#toast-box{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toast{background:var(--navy);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.25);animation:toastIn .25s ease;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media print{.hdr,.steps-bar,.nav,.hdr-btns,#toast-box,.btn-gerar{display:none!important}}

/* SIG LINK */
.laudo-sig-link{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.25);border-radius:8px;padding:12px;margin-top:8px;font-size:12px;}
.laudo-sig-url{font-family:monospace;font-size:11px;color:#8899bb;word-break:break-all;margin:6px 0;}
</style>
</head>

const QR_WA_URL = 'https://wa.me/55'+(getConsultor().tel||'').replace(/\D/g,'');
let _qrDataURL = '';

function buildQR(){
 return new Promise(resolve=>{
  if(_qrDataURL){resolve(_qrDataURL);return;}
  try{
   const wrap=document.createElement('div');
   wrap.style.cssText='position:fixed;left:-9999px;top:-9999px;visibility:hidden';
   document.body.appendChild(wrap);
   new QRCode(wrap,{text:QR_WA_URL,width:200,height:200,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
   setTimeout(()=>{
    const canvas=wrap.querySelector('canvas');
    if(canvas){_qrDataURL=canvas.toDataURL('image/png');}
    else{const img=wrap.querySelector('img');if(img)_qrDataURL=img.src;}
    document.body.removeChild(wrap);
    resolve(_qrDataURL);
   },400);
  }catch(e){resolve('');console.warn('QR error:',e);}
 });
}

      id:String(snap.id),
      user_id:userId,
      numero:snap.numero||'',
      cliente:snap.cliente||'',
      obra:snap.obra||'',
      cidade:snap.cidade||'',
      data:snap.data||null,
      criticidade:snap.criticidade||'MODERADO',

function loadLaudos(){
  try{ LAUDOS = JSON.parse(localStorage.getItem(_laudosKey()) || '[]'); }
  catch{ LAUDOS = []; }

  // ── Migração automática de laudos em chaves antigas ─────────────────────
  // Situação: laudos salvos antes do versionamento por userId ficam em:
  //   1) LAUDOS_KEY puro ('st_laudos_v3')  → versão muito antiga
  //   2) LAUDOS_KEY + '_anon'              → criados antes de fazer login
  // Se o usuário está logado e a lista está vazia, tenta importar dessas chaves.
  if (LAUDOS.length === 0 && _lpGetUserId()) {
    const legacyKeys = [LAUDOS_KEY, LAUDOS_KEY + '_anon'];
    for (const legacyKey of legacyKeys) {
      if (legacyKey === _laudosKey()) continue; // evitar loop na mesma chave
      try {
        const legacyData = JSON.parse(localStorage.getItem(legacyKey) || '[]');
        if (legacyData.length > 0) {
          LAUDOS = legacyData;
          saveLaudos(); // salva na chave correta (com userId)
          localStorage.removeItem(legacyKey); // limpa a chave antiga
          console.info(`[Laudos] ${legacyData.length} laudo(s) migrado(s) de "${legacyKey}" para "${_laudosKey()}"`);
          break;
        }
      } catch(e) { /* ignora erros de parse */ }
    }
  }
}
function saveLaudos(){ localStorage.setItem(_laudosKey(),JSON.stringify(LAUDOS)); }

 if(idx>=0)LAUDOS[idx]=snap; else LAUDOS.unshift(snap);

  for(const [k,v] of Object.entries(SEL)){sel2[k]={...v,fotos:[]};}
  const snap2={...D,sel:sel2,arqs:[],sig:''};
  if(idx>=0)LAUDOS[idx]=snap2; else LAUDOS.unshift(snap2);
  saveLaudos();
  toast('⚠️ Fotos não salvas (armazenamento cheio) — exporte o PDF antes de fechar.');
 }
 // Sincronizar metadados com Supabase (não bloqueia)
 _syncLaudoSupabase(snap);
 // Notificar app pai para atualizar dashboard

}

async function gerarLinkAssinaturaLaudo(laudoId){
  const uid = sessionStorage.getItem('pp_user_id');
  if(!uid){ toast('⚠️ Faça login para gerar links de assinatura'); return; }

  const laudo = LAUDOS.find(l => l.id === laudoId);
  if(!laudo){ toast('Laudo não encontrado'); return; }

  // Check if already has token
  let token = laudo.sigToken;
  if(!token){
    token = Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join('');
    laudo.sigToken = token;
    // Salvar com chave correta (inclui userId para não colidir entre usuários)
    saveLaudos();
    // Persistir token no Supabase se disponível
    if (_lpSb) {
      try{
        await _lpSb.from('laudos').update({sig_token: token}).eq('id', laudoId).eq('user_id', uid);
      }catch(e){ console.warn('Falha ao salvar sig_token no laudo:', e); }
    }
  }

  const url = `${window.PP.appUrl}${window.PP.assinarPath}?token=${token}`;
  const wppMsg = encodeURIComponent(`Olá! Segue o link para assinar o Laudo Técnico #${laudo.numero||laudoId.slice(-6)} digitalmente:\n${url}`);

  const html = `<div class="laudo-sig-link">
    <div style="font-size:12px;font-weight:700;color:#22c55e;margin-bottom:6px">🔗 Link de assinatura gerado</div>
    <div class="laudo-sig-url">${url}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
      <button onclick="navigator.clipboard.writeText('${url}').then(()=>toast('Link copiado!'))" style="padding:5px 12px;border-radius:6px;border:1px solid #253354;background:transparent;color:#8899bb;font-size:11px;cursor:pointer">📋 Copiar</button>
      <a href="https://wa.me/?text=${wppMsg}" target="_blank" style="padding:5px 12px;border-radius:6px;border:1px solid #253354;background:transparent;color:#8899bb;font-size:11px;text-decoration:none">📲 WhatsApp</a>
    </div>
  </div>`;

  toast('🔗 Link criado!');
  return { url, html, token };
}


// Merge sig fields from Supabase into local laudos
async function _syncSigTokens(){
  const uid=sessionStorage.getItem('pp_user_id');
  if(!uid || !_lpSb)return;
  try{
    const{data}=await _lpSb.from('laudos')
      .select('id,sig_token,sig_cliente,sig_cliente_at,sig_cliente_nome')
      .eq('user_id',uid).not('sig_token','is',null);
    if(data&&data.length){
      let changed=false;
      data.forEach(row=>{
        const l=LAUDOS.find(lc=>lc.id===row.id);
        if(l){
          if(row.sig_token&&!l.sigToken){l.sigToken=row.sig_token;changed=true;}
          if(row.sig_cliente&&!l.sigCliente){
            l.sigCliente=row.sig_cliente;
            l.sigClienteAt=row.sig_cliente_at;
            l.sigClienteNome=row.sig_cliente_nome;
            changed=true;
          }
        }
      });
      if(changed) saveLaudos(); // usa _laudosKey() para manter consistência
    }
  }catch(e){}
}

function initSigTecPad(){
 const c = document.getElementById('sig-tec-canvas');
 if(!c) return;
 const ctx = c.getContext('2d');
 ctx.strokeStyle = '#111827';
 ctx.lineWidth = 2;
 ctx.lineCap = 'round';
 ctx.lineJoin = 'round';
 let drawing = false, lx=0, ly=0;

 function pos(e){
  const r=c.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return {x:(src.clientX-r.left)*(c.width/r.width), y:(src.clientY-r.top)*(c.height/r.height)};
 }
 function start(e){e.preventDefault();drawing=true;const p=pos(e);lx=p.x;ly=p.y;}
 function move(e){
  e.preventDefault();
  if(!drawing)return;
  const p=pos(e);
  ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();
  lx=p.x;ly=p.y;
 }
 function end(){drawing=false;}
 c.addEventListener('mousedown',start);
 c.addEventListener('mousemove',move);
 c.addEventListener('mouseup',end);
 c.addEventListener('touchstart',start,{passive:false});
 c.addEventListener('touchmove',move,{passive:false});
 c.addEventListener('touchend',end);
}

async function analisarPixels(b64){
 return new Promise(resolve=>{
  const img=new Image();
  img.onload=()=>{
   const c=document.createElement('canvas');
   c.width=80;c.height=80;
   const ctx=c.getContext('2d');
   ctx.drawImage(img,0,0,80,80);
   const d=ctx.getImageData(0,0,80,80).data;
   let r=0,g=0,b=0,escuro=0,claro=0,sat=0;
   const n=d.length/4;
   for(let i=0;i<d.length;i+=4){
    r+=d[i];g+=d[i+1];b+=d[i+2];
    const bri=(d[i]+d[i+1]+d[i+2])/3;
    const s=Math.max(d[i],d[i+1],d[i+2])-Math.min(d[i],d[i+1],d[i+2]);
    if(bri<80)escuro++;
    if(bri>185)claro++;
    if(s>55)sat++;
   }
   resolve({r:r/n,g:g/n,b:b/n,bri:(r+g+b)/(3*n),escuro:escuro/n,claro:claro/n,sat:sat/n});
  };
  img.src=b64;
 });
}

function diagnosticarLocalmente(px,pat,subst,amb,grav,patId){
 // ── Inferência visual ──
 const temUmidade=px.escuro>0.25&&px.g>px.r;
 const temEflorescencia=px.claro>0.35&&px.bri>160;
 const temEnferrujamento=px.r>140&&px.r>px.b+20;
 const altaVariacao=px.sat>0.3;
 const superficieClara=px.bri>170;

 // ── Correlação com catálogo ──
 const pNome=pat?pat.nome:'Não definida';
 const pCat=pat?CATS[pat.cat]:{lb:'—',bg:'#eee',c:'#333'};
 const pCausa=pat?pat.causa.split(';')[0].trim():'Verificar condições locais';
 const pRec=pat?pat.rec.split(';')[0].trim():'Preparar superfície e reaplicar';
 const pTec=pat?pat.tec:'Inspecionar e documentar';
 const prodSW=pat?pat.prods.sw[0]||'—':'—';

 // ── Gravidade calculada ──
 let gravScore=0;
 if(grav==='Grave')gravScore=3;
 else if(grav==='Moderada')gravScore=2;
 else gravScore=1;
 if(temUmidade)gravScore=Math.max(gravScore,2);
 if(temEnferrujamento)gravScore=3;
 const gravFinal=gravScore>=3?'GRAVE':gravScore===2?'MODERADA':'LEVE';
 const gravBg={GRAVE:'#FEE2E2',MODERADA:'#FEF3C7',LEVE:'#DCFCE7'};
 const gravC={GRAVE:'#DC2626',MODERADA:'#D97706',LEVE:'#16A34A'};

 // ── Observações visuais ──
 const obs=[];
 if(temUmidade)obs.push('Tonalidade escura — indício de umidade ativa ou acúmulo');
 if(temEflorescencia)obs.push('Superfície clara/esbranquiçada — possível eflorescência ou salinização');
 if(temEnferrujamento)obs.push('Pigmentação avermelhada — provável oxidação ou ferrugem');
 if(altaVariacao)obs.push('Alta variação cromática — irregularidade de superfície ou destacamento parcial');
 if(superficieClara&&!temEflorescencia)obs.push('Superfície de cor clara uniforme — aspecto inicial preservado');
 if(!obs.length)obs.push('Imagem com características visuais neutras — avaliação presencial recomendada');

 // ── Substrato / Ambiente ──
 const subObs=subst!=='não informado'?'Substrato declarado: '+subst+'. ':'';
 const ambObs=amb!=='não informado'?'Ambiente: '+amb+'.':'';

 return '<div class="ai-titulo">🔬 ANÁLISE — Patologias de Superfície</div>'
  +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
  +'<span style="font-size:11px;font-weight:700;color:#1A56A0">'+pNome+'</span>'
  +'<span style="background:'+pCat.bg+';color:'+pCat.c+';font-size:9px;font-weight:700;padding:1px 7px;border-radius:8px">'+pCat.lb+'</span>'
  +'<span style="background:'+gravBg[gravFinal]+';color:'+gravC[gravFinal]+';font-size:9px;font-weight:700;padding:1px 7px;border-radius:8px">'+gravFinal+'</span>'
  +'</div>'
  +'<div style="background:#EEF3FA;border-radius:6px;padding:7px 9px;margin-bottom:7px">'
  +'<div style="font-size:9px;font-weight:700;color:#111827;margin-bottom:4px">📷 OBSERVAÇÕES VISUAIS</div>'
  +obs.map(o=>'<div style="font-size:10.5px;color:#1A56A0;margin-bottom:2px">• '+o+'</div>').join('')
  +'</div>'
  +'<div style="font-size:10.5px;color:#222;margin-bottom:5px;line-height:1.6">'
  +'<strong>Diagnóstico:</strong> '+pTec+'</div>'
  +'<div style="font-size:10.5px;color:#555;margin-bottom:5px;line-height:1.5">'
  +'<strong>Causa provável:</strong> '+pCausa+'</div>'
  +'<div style="font-size:10.5px;color:#555;margin-bottom:5px;line-height:1.5">'
  +'<strong>Ação recomendada:</strong> '+pRec+'</div>'
  +(subObs||ambObs?'<div style="font-size:9.5px;color:#888;margin-bottom:6px;font-style:italic">'+subObs+ambObs+'</div>':'')
  +'<div style="border-top:1px solid #DDD6FE;margin-top:6px;padding-top:6px;display:flex;align-items:center;justify-content:space-between">'
  +'<span style="font-size:9px;font-weight:700;color:#16A34A">🛒 Produto SW: '+prodSW+'</span>'
  +'<span style="font-size:9px;color:#7C3AED;opacity:.7">Análise local · MestrePro</span>'
  +'</div>';
}


// ── Hash de verificação do laudo ─────────────────────────────
function laudoHash(d){
 const str=(d.numero||'')+(d.cliente||'')+(d.data||'')+(d.obra||'')+(Object.keys(d.sel||{}).join(''));
 let h=5381;
 for(let i=0;i<str.length;i++) h=((h<<5)+h)+str.charCodeAt(i);
 const abs=Math.abs(h);
 return 'ST-'+(abs%10000).toString().padStart(4,'0')+'-'+(str.length%100).toString().padStart(2,'0');
}

function importarLaudosJSON(input){
 const file=input.files[0]; if(!file)return;
 const r=new FileReader();
 r.onload=e=>{
  try{
   const parsed=JSON.parse(e.target.result);
   const novos=parsed.laudos||parsed;
   if(!Array.isArray(novos))throw new Error('Formato inválido');
   const existentes=LAUDOS.map(l=>l.id);
   const importados=novos.filter(l=>!existentes.includes(l.id));
   LAUDOS=[...LAUDOS,...importados];
   saveLaudos();
   toast('✓ '+importados.length+' laudos importados ('+( novos.length-importados.length)+' já existiam)');
   renderHome(document.getElementById('app'));
  }catch(err){toast('⚠️ Arquivo inválido: '+err.message);}
 };
 r.readAsText(file); input.value='';
}

function tgPat(id){
 if(SEL[id]){delete SEL[id];}
 else{const def=CUSTO_DEFAULT[id];SEL[id]={grav:'Moderada',nota:'',fotos:[],custo:def?def.est:''};}

function setGrav(id,g){
 if(!SEL[id])return;SEL[id].grav=g;
 const card=document.getElementById('pc'+id);
 if(!card)return;
 card.querySelectorAll('.gbtn').forEach(b=>b.classList.toggle('on',b.textContent.trim()===g));
 const badges=card.querySelector('.pat-badges');
 if(badges){const old=badges.querySelector('.badge');if(old)old.remove();badges.insertAdjacentHTML('beforeend',getGravChip(g));}
}
function setNota(id,v){ if(SEL[id])SEL[id].nota=v; }
function setArea(id,v){
 if(!SEL[id])return;
 SEL[id].area=parseFloat(v)||0;
 const custo=SEL[id].custo||'';
 const el=document.getElementById('custo-total-'+id);
 if(el){
  if(SEL[id].area&&custo){el.textContent=calcCustoTotal(custo,SEL[id].area);el.style.color='var(--green)';}
  else{el.textContent='informe área';el.style.color='var(--sub)';}
 }
}
function calcCustoTotal(faixa,area){
 if(!faixa||!area)return '';
 // Parse "R$ 30–60/m²" or "R$ 30-60/m²"
 const m=faixa.replace(/\s/g,'').match(/(\d+)[–\-](\d+)/);
 if(!m)return '';
 const a=parseFloat(area)||0;
 const mn=parseInt(m[1])*a, mx=parseInt(m[2])*a;
 const fmt=v=>v>=1000?'R$'+(v/1000).toFixed(1)+'k':'R$'+v.toFixed(0);
 return '≈ '+fmt(mn)+' – '+fmt(mx)+' ('+a+'m²)';
}
function setCusto(id,v){ if(SEL[id])SEL[id].custo=v; }
function tgDetail(id){
 const det=document.getElementById('det'+id);const btn=document.getElementById('dbtn'+id);if(!det)return;
 const open=!det.classList.contains('open');det.classList.toggle('open',open);
 if(btn)btn.innerHTML=open?'▲ Ocultar procedimento':'▼ Ver procedimento e produtos';
}

// Foto inline na patologia
function triggerPatFoto(id){ document.getElementById('pfin'+id)?.click(); }
function onPatFoto(id,input){
 const files=[...input.files];
 const promises=files.map(f=>new Promise(resolve=>{
  const r=new FileReader();
  r.onload=async ev=>{
   let b64=ev.target.result;
   b64=await resizeImgAsync(b64,1200,.80);
   resolve({b64,leg:''});
  };r.readAsDataURL(f);
 }));
 Promise.all(promises).then(items=>{
  if(!SEL[id])SEL[id]={grav:'Moderada',nota:'',fotos:[],custo:''};
  if(!SEL[id].fotos)SEL[id].fotos=[];
  SEL[id].fotos.push(...items);
  // update thumbs without full re-render
  const row=document.getElementById('fprow'+id);
  if(row){
   const add=row.querySelector('.pat-photo-add');
   items.forEach((f,fi)=>{
    const idx=SEL[id].fotos.length-items.length+fi;
    const div=document.createElement('div');div.className='pat-photo-thumb';
    div.innerHTML=`<img src="${f.b64}" alt=""><div class="pat-photo-del" onclick="delPatFoto(${id},${idx})">✕</div><input class="pat-photo-leg" placeholder="Legenda" onchange="setPatFotoLeg(${id},${idx},this.value)">`;
    row.insertBefore(div,add);
   });
  }
 });
 input.value='';
}
function delPatFoto(id,fi){
 if(!SEL[id]?.fotos)return;
 SEL[id].fotos.splice(fi,1);
 renderStepContent();
}
function setPatFotoLeg(id,fi,v){ if(SEL[id]?.fotos?.[fi])SEL[id].fotos[fi].leg=v; }

function step1save(){ saveCurrent(); }

function gerarTudo(){
 step1save();
 const psel=PATS.filter(p=>SEL[p.id]);
 if(!psel.length){toast('Selecione ao menos uma patologia!');return;}
 const imgCount=psel.reduce((acc,p)=>(SEL[p.id]?.fotos?.length||0)+acc,0);
 const loc=D.obra?'no imóvel localizado em '+D.obra:'no imóvel vistoriado';
 const cli=D.cliente?' do cliente '+D.cliente:'';
 const nomes=psel.map((p,i)=>`${i+1}. ${p.nome} (${SEL[p.id].grav})`).join(';\n');
 const graves=psel.filter(p=>SEL[p.id]?.grav==='Grave');
 const mod=psel.filter(p=>SEL[p.id]?.grav==='Moderada');
 const imgObs=imgCount?` Foram registrados ${imgCount} arquivo(s) fotográfico(s).`:'';
 const crit=calcCriticidade(); D.criticidade=crit;

 D.objeto=`O presente laudo técnico tem por objetivo registrar e diagnosticar as manifestações patológicas identificadas ${loc}${cli}, durante vistoria técnica realizada em ${fmtDate(D.data)}, com foco no sistema de pintura e revestimento das superfícies inspecionadas.${imgObs}`;

 D.descricao=`Durante a vistoria foram identificadas ${psel.length} manifestação${psel.length>1?'s':''} patológica${psel.length>1?'s':''}:\n\n${nomes}${graves.length?'\n\nPatologias GRAVE (intervenção imediata): '+graves.map(p=>p.nome).join(', ')+'.':''}`;

 // Diagnóstico com observações de campo integradas
 const cats=[...new Set(psel.map(p=>p.cat))];
 D.diagnostico=`As manifestações identificadas possuem origem em fatores de ${cats.map(c=>CATS[c]?CATS[c].lb:c).join(', ')}.\n\n${psel.map(p=>{
  const nota=SEL[p.id]?.nota;
  const g=SEL[p.id]?.grav;
  let linha=`■ ${p.nome} [${g}]: ${p.tec}`;
  if(nota)linha+=`\n  → Observação de campo: ${nota}`;
  return linha;
 }).join('\n\n')}`;

 D.causas=psel.map(p=>{
  const cs=p.causa.split(';').map(c=>c.trim()).filter(Boolean);
  return `${p.nome}:\n${cs.map(c=>`  • ${c}`).join(';\n')}.`;
 }).join('\n\n');

 D.consequencias=psel.map(p=>{
  const g=SEL[p.id]?.grav;const nota=SEL[p.id]?.nota;
  let base=`A não correção de ${p.nome} poderá resultar em agravamento progressivo, aumento dos custos de manutenção e redução da vida útil do sistema de pintura.`;
  if(g==='Grave')base+=' ⚠️ Gravidade GRAVE — requer intervenção imediata.';
  if(nota)base+=` Obs.: ${nota}.`;
  return `${p.nome}:\n  ${base}`;
 }).join('\n\n');

 D.recomendacoes=psel.map((p,i)=>{
  const rs=p.rec.split(';').map(r=>r.trim()).filter(Boolean);
  return `${i+1}. ${p.nome}:\n${rs.map((r,j)=>`   ${j+1}. ${r}`).join(';\n')}.`;
 }).join('\n\n')+'\n\nTodos os procedimentos devem ser executados por profissional qualificado, respeitando as normas técnicas e recomendações dos fabricantes.';

 D.produtos=psel.map((p,i)=>`${i+1}. ${p.nome}:\n   Eucatex: ${p.prods.eucatex.join(', ')};\n   Sherwin-Williams: ${p.prods.sw.join(', ')}.`).join('\n\n')+
  `\n\nProdutos disponíveis na ${CONSULTOR.empresa}.\n${CONSULTOR.end} | ${CONSULTOR.tel} | ${CONSULTOR.site}`;

 D.conclusao=`Com base na vistoria técnica realizada${D.cidade?' em '+D.cidade:''}, conclui-se que o estado de conservação do sistema de pintura e revestimento é ${crit}.\n\nForam identificadas ${psel.length} manifestação${psel.length>1?'s':''} patológica${psel.length>1?'s':''}, sendo ${graves.length} Grave${graves.length!==1?'s':''}, ${mod.length} Moderada${mod.length!==1?'s':''} e ${psel.length-graves.length-mod.length} Leve${(psel.length-graves.length-mod.length)!==1?'s':''}.${imgObs}\n\nAs intervenções recomendadas, executadas corretamente, deverão restabelecer as condições adequadas de proteção e estética das superfícies.`;

 renderStepContent();toast('Sugestão técnica gerada! ✓');
}

let _sigCtx=null;let _sigDrawing=false;let _sigHasData=false;
function initSig(){
 const canvas=document.getElementById('sig-canvas');if(!canvas)return;
 canvas.width=canvas.offsetWidth||320;
 _sigCtx=canvas.getContext('2d');
 _sigCtx.lineWidth=2;_sigCtx.lineCap='round';_sigCtx.strokeStyle='#1E2A3A';
 if(SIG_DATA){const img=new Image();img.onload=()=>_sigCtx.drawImage(img,0,0,canvas.width,canvas.height);img.src=SIG_DATA;_sigHasData=true;document.getElementById('sig-ph').style.display='none';}
 const pos=e=>{ const r=canvas.getBoundingClientRect(); return e.touches?{x:(e.touches[0].clientX-r.left)*(canvas.width/r.width),y:(e.touches[0].clientY-r.top)*(canvas.height/r.height)}:{x:(e.clientX-r.left)*(canvas.width/r.width),y:(e.clientY-r.top)*(canvas.height/r.height)}; };
 canvas.addEventListener('mousedown',e=>{_sigDrawing=true;const p=pos(e);_sigCtx.beginPath();_sigCtx.moveTo(p.x,p.y);document.getElementById('sig-ph').style.display='none';});
 canvas.addEventListener('mousemove',e=>{if(!_sigDrawing)return;const p=pos(e);_sigCtx.lineTo(p.x,p.y);_sigCtx.stroke();_sigHasData=true;});
 canvas.addEventListener('mouseup',()=>{_sigDrawing=false;saveSig();});
 canvas.addEventListener('touchstart',e=>{e.preventDefault();_sigDrawing=true;const p=pos(e);_sigCtx.beginPath();_sigCtx.moveTo(p.x,p.y);document.getElementById('sig-ph').style.display='none';},{passive:false});
 canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!_sigDrawing)return;const p=pos(e);_sigCtx.lineTo(p.x,p.y);_sigCtx.stroke();_sigHasData=true;},{passive:false});
 canvas.addEventListener('touchend',()=>{_sigDrawing=false;saveSig();});
}
function saveSig(){ const c=document.getElementById('sig-canvas');if(c&&_sigHasData){SIG_DATA=c.toDataURL('image/png');} }
function clearSig(){ _sigCtx?.clearRect(0,0,document.getElementById('sig-canvas')?.width||400,140);SIG_DATA='';_sigHasData=false;document.getElementById('sig-ph').style.display='flex';renderStepContent(); }

  if(!faixa||!area)return '';

  if(!m)return '';
  const a=parseFloat(area)||0;
  const mn=parseInt(m[1])*a, mx=parseInt(m[2])*a;
  const fmt=v=>v>=1000?'R$'+(v/1000).toFixed(1)+'k':'R$'+v.toFixed(0);
  return '\u2248 '+fmt(mn)+' \u2013 '+fmt(mx)+' ('+a+'m\u00B2)';
 }

function renderConsulta(app){
 app.innerHTML=`
 <div class="hdr">
  <div class="hdr-row">
   <div class="hdr-logo" style="font-size:16px">Consulta Rápida<span>Patologias e produtos</span></div>
   <div class="hdr-btns"><button class="hdr-btn" onclick="SCR='home';render()">← Home</button></div>
  </div>
 </div>
 <div class="content">
  <div class="cq-search"><span class="ico">🔍</span><input placeholder="Buscar patologia..." id="cq-input" oninput="filterCQ(this.value)" value="${h(_cqFilter)}"></div>
  <div id="cq-list">${renderCQList()}</div>
 </div>`;
}
function renderCQList(){
 const q=_cqFilter.toLowerCase();
 const filtered=PATS.filter(p=>!q||p.nome.toLowerCase().includes(q)||p.tec.toLowerCase().includes(q)||p.cat.includes(q));
 if(!filtered.length)return '<div class="empty-state"><div class="ico">🔍</div><p>Nenhuma patologia encontrada</p></div>';
 return filtered.map(p=>{
  const cat=CATS[p.cat];
  const passosH=p.passos.map((s,i)=>`<div class="passo-item"><div class="passo-num">${i+1}</div><div class="passo-txt">${h(s)}</div></div>`).join('');
  const prodEH=p.prods.eucatex.map(pr=>`<div class="prod-item">${h(pr)}</div>`).join('');
  const prodSH=p.prods.sw.map(pr=>`<div class="prod-item">${h(pr)}</div>`).join('');
  return `<div class="cq-card" onclick="tgCQ(${p.id})">
   <div class="cq-head"><div style="flex:1"><div style="font-weight:600;font-size:13.5px">${h(p.nome)}</div><div style="margin-top:3px"><span class="pat-cat" style="background:${cat.bg};color:${cat.c}">${cat.lb}</span></div></div><div style="font-size:10px;color:var(--sub)" id="cqarr${p.id}">▼</div></div>
   <div class="cq-body" id="cqb${p.id}">
    <div class="pat-own" style="margin-top:10px"><strong>Linguagem Simplificada</strong>${h(p.own)}</div>
    <div class="passo-box" style="margin-top:10px"><div class="passo-tit">🔧 PASSO A PASSO</div>${passosH}</div>
    <div class="prods-box"><div class="prods-tit">🍃 PRODUTOS RECOMENDADOS</div><div class="prods-cols"><div><div class="prod-marca">Eucatex</div>${prodEH}</div><div><div class="prod-marca">Sherwin-Williams</div>${prodSH}</div></div></div>
   </div>
  </div>`;
 }).join('');
}

// ─── IMAGE UTILS ─────────────────────
function resizeImgAsync(b64,maxW,q){
 return new Promise(resolve=>{
  try{
   const img=new Image();
   img.onload=()=>{
    try{
     const w=Math.min(img.width,maxW);const r=w/img.width;
     const c=document.createElement('canvas');c.width=w;c.height=Math.round(img.height*r);
     const ctx=c.getContext('2d');ctx.drawImage(img,0,0,c.width,c.height);
     resolve(c.toDataURL('image/jpeg',q));
    }catch{resolve(b64);}
   };img.onerror=()=>resolve(b64);img.src=b64;
  }catch{resolve(b64);}
 });
}

// drag and drop
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
 e.preventDefault();
 if(SCR!=='form'||STEP!==2)return;
 const files=[...e.dataTransfer.files];
 files.forEach(f=>{const r=new FileReader();r.onload=ev=>{ARQS.push({name:f.name,type:f.type,b64:ev.target.result,leg:''});renderStepContent();};r.readAsDataURL(f);});
});

// ─── INIT ────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
 loadLaudos(); render();
 // Load prof sig from unified storage (safe — no DOM needed)
 const _unified=localStorage.getItem('pp_sig_profissional');
 if(_unified){SIG_TEC=_unified;localStorage.setItem(SIG_TEC_KEY,_unified);}
 else{const _ex=localStorage.getItem(SIG_TEC_KEY);if(_ex)SIG_TEC=_ex;}
 // Sync sig tokens from Supabase after a delay (parent needs time to set sessionStorage)
 setTimeout(_syncSigTokens, 1500);

 // ── Ouvir comandos do app pai (postMessage)
 window.addEventListener('message', e => {
   if(!e.data || e.data.type !== 'pp_cmd') return;
   const cmd = e.data.cmd;
   if(cmd === 'startNewLaudo'){ startNewLaudo(); }
   if(cmd === 'syncTheme'){
     // laudos tem tema próprio mas podemos adaptar o fundo
     const isDark = e.data.theme === 'dark';
     document.documentElement.style.setProperty('--sky', isDark ? '#111' : '#EEF3FA');
     document.documentElement.style.setProperty('--white', isDark ? '#1a1a17' : '#fff');
     document.documentElement.style.setProperty('--txt', isDark ? '#f2ede6' : '#1E2A3A');
     document.documentElement.style.setProperty('--border', isDark ? '#2a2a26' : '#C8D8EE');
     document.documentElement.style.setProperty('--sub', isDark ? '#a09080' : '#5A6A7E');
     document.body.style.background = isDark ? '#0a0a09' : '#EEF3FA';
   }
 });
});
