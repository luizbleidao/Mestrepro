[build]
  publish = "."

# ── Rotas limpas ──────────────────────────────────────────────────────────
[[redirects]]
  from   = "/"
  to     = "/index.html"
  status = 200

[[redirects]]
  from   = "/entrar"
  to     = "/pintopro-login.html"
  status = 200

[[redirects]]
  from   = "/app"
  to     = "/pintopro-app.html"
  status = 200

[[redirects]]
  from   = "/admin"
  to     = "/pintopro-admin.html"
  status = 200

[[redirects]]
  from   = "/assinar"
  to     = "/pintopro-assinar.html"
  status = 200

[[redirects]]
  from   = "/planos"
  to     = "/pintopro-planos.html"
  status = 200

[[redirects]]
  from   = "/sobre"
  to     = "/sobre.html"
  status = 200

[[redirects]]
  from   = "/blog"
  to     = "/blog.html"
  status = 200

[[redirects]]
  from   = "/cookies"
  to     = "/cookies.html"
  status = 200

# ── Headers de segurança (todas as páginas) ───────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    # Content-Security-Policy:
    #  - default-src 'self'          → bloqueia qualquer recurso não listado
    #  - script-src + cdn permitidos → Supabase, fonts, libs CDN usadas
    #  - connect-src                 → APIs externas que o app chama
    #  - img-src data: blob:         → para previews de assinatura canvas e logos
    #  - frame-ancestors 'self'      → bloqueia embedding exceto mesmo domínio
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.anthropic.com https://api.mercadopago.com https://api.ipify.org; img-src 'self' data: blob:; frame-src 'self'; frame-ancestors 'self'; object-src 'none'; base-uri 'self';"
    # Cache para páginas HTML: sem cache (sempre versão mais recente)
    Cache-Control = "no-cache, must-revalidate"

# ── Cache agressivo para assets estáticos imutáveis ──────────────────────
# Fontes e libs CDN não mudam — cache de 1 ano (365 dias)
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JS de configuração: sem cache (atualiza junto com deploys)
[[headers]]
  for = "/pp-config.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# JS de módulos: sem cache (atualiza junto com deploys)
[[headers]]
  for = "/pp-modules.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# ── Headers específicos por página ────────────────────────────────────────
# iframes de orçamentos e laudos: permitir embedding no próprio domínio
[[headers]]
  for = "/pintopro-orcamentos.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/pintopro-laudos.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

# Admin: nunca indexar
[[headers]]
  for = "/pintopro-admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store"

# Assinar: pode ser embeddado em qualquer origem (link externo ao cliente)
[[headers]]
  for = "/pintopro-assinar.html"
  [headers.values]
    X-Frame-Options  = "ALLOWALL"
    Cache-Control    = "no-cache, must-revalidate"
