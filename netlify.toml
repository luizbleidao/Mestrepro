# ═══════════════════════════════════════════════════════════════════
# netlify.toml — Configuração de Deploy do MestrePro
# ═══════════════════════════════════════════════════════════════════

# ── Build principal (produção e branch deploys) ───────────────────
[build]
  command = "node inject-env.js"
  publish = "."

# ── Contexto: produção ────────────────────────────────────────────
[context.production]
  command = "node inject-env.js"

# ── Contexto: preview (Pull Requests) ────────────────────────────
# Em preview, o build roda normalmente mas com variáveis próprias
[context.deploy-preview]
  command = "node inject-env.js"

# ── Contexto: branch deploys ──────────────────────────────────────
[context.branch-deploy]
  command = "node inject-env.js"

# ── Rotas limpas ─────────────────────────────────────────────────
[[redirects]]
  from   = "/"
  to     = "/index.html"
  status = 200

[[redirects]]
  from   = "/entrar"
  to     = "/pintopro-login.html"
  status = 200

[[redirects]]
  from   = "/app"
  to     = "/pintopro-app.html"
  status = 200

[[redirects]]
  from   = "/admin"
  to     = "/pintopro-admin.html"
  status = 200

[[redirects]]
  from   = "/assinar"
  to     = "/pintopro-assinar.html"
  status = 200

[[redirects]]
  from   = "/planos"
  to     = "/pintopro-planos.html"
  status = 200

[[redirects]]
  from   = "/sobre"
  to     = "/sobre.html"
  status = 200

[[redirects]]
  from   = "/blog"
  to     = "/blog.html"
  status = 200

[[redirects]]
  from   = "/cookies"
  to     = "/cookies.html"
  status = 200

# ── 404 personalizado ────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

# ── Headers de segurança (todas as páginas) ──────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com https://connect.facebook.net https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.anthropic.com https://api.mercadopago.com https://api.ipify.org https://graph.facebook.com https://www.google-analytics.com; img-src 'self' data: blob: https://www.facebook.com; frame-src 'self'; frame-ancestors 'self'; object-src 'none'; base-uri 'self';"
    Cache-Control = "no-cache, must-revalidate"

# ── Cache de assets estáticos ────────────────────────────────────
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache de configs: sem cache ──────────────────────────────────
[[headers]]
  for = "/pp-config.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/pp-modules.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/build-manifest.json"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# ── Headers específicos por página ───────────────────────────────
[[headers]]
  for = "/pintopro-orcamentos.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/pintopro-laudos.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/pintopro-admin.html"
  [headers.values]
    X-Robots-Tag  = "noindex, nofollow"
    Cache-Control = "no-store"

[[headers]]
  for = "/pintopro-assinar.html"
  [headers.values]
    X-Frame-Options  = "ALLOWALL"
    Cache-Control    = "no-cache, must-revalidate"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co; img-src 'self' data: blob:; frame-ancestors *; object-src 'none';"
