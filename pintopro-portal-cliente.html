<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>MestrePro — Portal do Cliente</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="pp-config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --acc:#185FA5;--acc2:#2272c3;
  --green:#16a34a;--amber:#d97706;--red:#dc2626;--blue:#2563eb;
  --bg:#f0f4fa;--surf:#fff;--surf2:#f8fafc;--border:#e2e8f0;
  --text:#1a202c;--text2:#4a5568;--text3:#a0aec0;
  --r:12px;--rs:8px;--sh:0 2px 16px rgba(0,0,0,.07);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
.wrap{max-width:720px;margin:0 auto;padding:20px 14px 60px;}

/* HEADER */
.hd{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.hd .logo{font-size:20px;font-weight:800;color:var(--acc);}
.hd .sep{color:var(--border);font-size:18px;}
.hd .proj{font-size:15px;font-weight:600;flex:1;}
.hd .status-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;}
.pill-andamento{background:#dbeafe;color:#1d4ed8;}
.pill-concluido{background:#d1fae5;color:#065f46;}
.pill-agendado{background:#fef3c7;color:#92400e;}
.pill-pendente{background:#f3f4f6;color:#374151;}

/* PROGRESSO */
.prog-card{background:var(--surf);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);padding:20px 22px;margin-bottom:14px;}
.prog-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:10px;}
.prog-bar-wrap{background:#e2e8f0;border-radius:20px;height:10px;overflow:hidden;margin-bottom:6px;}
.prog-bar{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .5s ease;}
.prog-pct{font-size:13px;font-weight:700;color:var(--acc);text-align:right;}
.etapas{display:flex;gap:0;margin-top:14px;overflow-x:auto;padding-bottom:4px;}
.etapa{flex:1;min-width:80px;text-align:center;position:relative;}
.etapa::before{content:'';position:absolute;top:12px;left:50%;right:-50%;height:2px;background:var(--border);z-index:0;}
.etapa:last-child::before{display:none;}
.etapa-dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:12px;margin:0 auto 6px;position:relative;z-index:1;}
.etapa.done .etapa-dot{background:var(--green);border-color:var(--green);color:#fff;}
.etapa.active .etapa-dot{background:var(--acc);border-color:var(--acc);color:#fff;}
.etapa-lb{font-size:10px;color:var(--text3);line-height:1.3;}
.etapa.done .etapa-lb,.etapa.active .etapa-lb{color:var(--text2);}

/* CARDS GERAIS */
.card{background:var(--surf);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);margin-bottom:14px;overflow:hidden;}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.card-header-title{font-size:13px;font-weight:700;}
.card-body{padding:16px 18px;}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-item label{font-size:11px;color:var(--text3);display:block;margin-bottom:2px;}
.info-item span{font-size:13px;font-weight:500;}

/* FOTOS */
.fotos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
.foto-item{aspect-ratio:1;border-radius:var(--rs);overflow:hidden;cursor:pointer;border:1px solid var(--border);}
.foto-item img{width:100%;height:100%;object-fit:cover;transition:.15s;}
.foto-item img:hover{transform:scale(1.04);}
.foto-empty{text-align:center;padding:24px;color:var(--text3);font-size:13px;}

/* ORÇAMENTO RESUMO */
.total-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid var(--border);}
.total-row:last-child{border-bottom:none;font-weight:700;font-size:15px;padding-top:12px;}
.grand-val{color:var(--acc);}

/* MENSAGEM / CHAT */
.msg-list{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto;padding:2px;}
.msg{border-radius:10px;padding:9px 12px;font-size:13px;line-height:1.5;max-width:82%;}
.msg.pintor{background:#dbeafe;color:#1e40af;align-self:flex-start;}
.msg.cliente{background:var(--acc);color:#fff;align-self:flex-end;}
.msg-meta{font-size:10px;opacity:.7;margin-top:3px;}
.msg-input-row{display:flex;gap:8px;margin-top:10px;}
.msg-input-row input{flex:1;border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;font-size:13px;font-family:inherit;color:var(--text);}
.msg-input-row button{background:var(--acc);color:#fff;border:none;border-radius:var(--rs);padding:9px 14px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;}

/* LIGHTBOX */
.lb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:none;align-items:center;justify-content:center;}
.lb-overlay.open{display:flex;}
.lb-img{max-width:92vw;max-height:88vh;border-radius:var(--r);object-fit:contain;}
.lb-close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none;line-height:1;}

/* ASSINAR */
.assinar-btn{width:100%;background:var(--acc);color:#fff;border:none;border-radius:var(--rs);padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:.15s;}
.assinar-btn:hover{background:var(--acc2);}
.assinar-btn:disabled{opacity:.5;cursor:not-allowed;}

/* SPINNER */
.spinner{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;color:var(--text2);}
.spinner .ring{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
.footer{text-align:center;font-size:11px;color:var(--text3);padding:20px 0;}
.footer a{color:var(--acc);text-decoration:none;}

@media(max-width:480px){
  .info-grid{grid-template-columns:1fr;}
  .etapa-lb{display:none;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <div class="logo">MestrePro</div>
    <span class="sep">|</span>
    <div class="proj" id="hd-proj">Portal do cliente</div>
    <span class="status-pill pill-pendente" id="hd-status">Carregando...</span>
  </div>
  <div id="main-content">
    <div class="spinner"><div class="ring"></div><span>Carregando seu portal...</span></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lb-overlay" id="lb-overlay" onclick="closeLb()">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <img class="lb-img" id="lb-img" src="" alt="Foto do serviço">
</div>

<script>
const _p = new URLSearchParams(location.search);
const _portalToken = _p.get('ptoken') || _p.get('token');
let _sb, _portalData, _msgs = [];

// ── HELPERS ───────────────────────────────────────────────────
function fmt(v){ return (v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(s){ if(!s)return'—'; return new Date(s.includes('T')?s:s+'T12:00:00').toLocaleDateString('pt-BR'); }
function fmtDateTime(s){ if(!s)return''; return new Date(s).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  if (!_portalToken) { showErro('Link inválido', 'Este portal precisa de um link válido. Solicite ao profissional.'); return; }

  const cfg = window.PP_CONFIG || window.PP || {};
  const url = cfg.supabaseUrl || cfg.SUPABASE_URL;
  const key = cfg.supabaseAnonKey || cfg.SUPABASE_ANON_KEY;
  if (!url || !key) { showErro('Configuração ausente', 'Erro interno.'); return; }
  _sb = window.supabase.createClient(url, key);

  // Busca dados do portal (tabela portais_cliente ou orcamentos com portal_token)
  let orc = null;
  try {
    const { data, error } = await _sb
      .from('orcamentos')
      .select('id, numero, cliente, endereco, status, total, data_completa, sig_token, aprov_status, user_id, mode, portal_token, portal_progresso, portal_fotos, portal_mensagens, portal_etapa')
      .eq('portal_token', _portalToken)
      .single();
    if (!error && data) orc = data;
  } catch(e){}

  // Fallback: busca pelo aprov_token (compatibilidade)
  if (!orc) {
    try {
      const { data } = await _sb.from('orcamentos')
        .select('id, numero, cliente, endereco, status, total, data_completa, sig_token, aprov_status, user_id, mode, portal_token, portal_progresso, portal_fotos, portal_mensagens, portal_etapa')
        .eq('aprov_token', _portalToken).single();
      if (data) orc = data;
    } catch(e){}
  }

  if (!orc) { showErro('Portal não encontrado', 'Link inválido ou expirado. Solicite um novo link ao profissional.'); return; }

  _portalData = orc;
  _msgs = orc.portal_mensagens || [];
  renderPortal(orc);
}

// ── RENDER PRINCIPAL ─────────────────────────────────────────
function renderPortal(o) {
  const dc = o.data_completa || {};
  const servicos = dc.servicos || [];
  const materiais = dc.materiais || dc.produtos || [];
  const progresso = o.portal_progresso ?? 0;
  const fotos = o.portal_fotos || [];
  const etapaAtual = o.portal_etapa || 0;
  const status = o.status || 'pendente';

  // Etapas padrão
  const etapas = [
    { lb: 'Orçamento', ic: '📋' },
    { lb: 'Aprovado', ic: '✅' },
    { lb: 'Preparação', ic: '🔧' },
    { lb: 'Em andamento', ic: '🖌️' },
    { lb: 'Finalização', ic: '✨' },
    { lb: 'Concluído', ic: '🎉' },
  ];

  // Header
  const statusMap = {
    rascunho:'Aguardando', pendente:'Aguardando', aprovado:'Em andamento',
    em_andamento:'Em andamento', concluido:'Concluído', cancelado:'Cancelado'
  };
  const pillMap = {
    aprovado:'pill-andamento', concluido:'pill-concluido',
    em_andamento:'pill-andamento', rascunho:'pill-pendente', pendente:'pill-pendente'
  };
  document.getElementById('hd-proj').textContent = dc.nomeProjeto || dc.nome_projeto || `Serviço #${o.numero}`;
  const hStatus = document.getElementById('hd-status');
  hStatus.textContent = statusMap[status] || status;
  hStatus.className = 'status-pill ' + (pillMap[status] || 'pill-pendente');

  // Etapas HTML
  const etapasHtml = etapas.map((et, i) => {
    const cls = i < etapaAtual ? 'done' : i === etapaAtual ? 'active' : '';
    const ic = i < etapaAtual ? '✓' : et.ic;
    return `<div class="etapa ${cls}"><div class="etapa-dot">${ic}</div><div class="etapa-lb">${et.lb}</div></div>`;
  }).join('');

  // Totais
  const totalServ = servicos.reduce((s,sv)=>s+(parseFloat(sv.valorServico)||0),0);
  const totalMat  = materiais.reduce((s,m)=>s+(parseFloat(m.total||m.subtotal)||(parseFloat(m.preco||0)*parseFloat(m.qtd||1))),0);
  const desconto = parseFloat(dc.desconto||0);
  const total = parseFloat(o.total||0);

  let orcRows = '';
  if (totalServ>0) orcRows += `<div class="total-row"><span>Mão de obra / serviços</span><span>R$ ${fmt(totalServ)}</span></div>`;
  if (totalMat>0 && o.mode!=='rel') orcRows += `<div class="total-row"><span>Materiais</span><span>R$ ${fmt(totalMat)}</span></div>`;
  if (desconto>0) orcRows += `<div class="total-row"><span>Desconto</span><span style="color:var(--green)">− R$ ${fmt(desconto)}</span></div>`;
  orcRows += `<div class="total-row"><span>Total</span><span class="grand-val">R$ ${fmt(total)}</span></div>`;

  // Fotos HTML
  let fotosHtml = fotos.length
    ? `<div class="fotos-grid">${fotos.map((f,i)=>`<div class="foto-item" onclick="openLb('${f}')"><img src="${f}" alt="Foto ${i+1}" loading="lazy"></div>`).join('')}</div>`
    : `<div class="foto-empty">📷 Nenhuma foto enviada ainda pelo profissional.</div>`;

  // Mensagens HTML
  const msgsHtml = _msgs.length
    ? _msgs.map(m=>`<div class="msg ${m.de||'pintor'}"><div>${m.texto}</div><div class="msg-meta">${m.de==='cliente'?'Você':'Profissional'} · ${fmtDateTime(m.em)}</div></div>`).join('')
    : '<div style="text-align:center;font-size:12px;color:var(--text3);padding:12px">Sem mensagens ainda. Mande uma pergunta!</div>';

  // Botão de assinatura
  const temSigToken = o.sig_token;
  const assinHtml = temSigToken
    ? `<a href="pintopro-assinar.html?token=${o.sig_token}" style="display:block"><button class="assinar-btn">✍️ Assinar documento</button></a>`
    : `<button class="assinar-btn" disabled>✍️ Assinatura disponível após aprovação</button>`;

  document.getElementById('main-content').innerHTML = `
    <!-- PROGRESSO -->
    <div class="prog-card">
      <div class="prog-label">Progresso do serviço</div>
      <div class="prog-bar-wrap"><div class="prog-bar" style="width:${progresso}%"></div></div>
      <div class="prog-pct">${progresso}% concluído</div>
      <div class="etapas">${etapasHtml}</div>
    </div>

    <!-- INFO DO SERVIÇO -->
    <div class="card">
      <div class="card-header"><span>📋</span><span class="card-header-title">Detalhes do serviço</span></div>
      <div class="card-body">
        <div class="info-grid">
          <div class="info-item"><label>Cliente</label><span>${o.cliente||'—'}</span></div>
          <div class="info-item"><label>Local</label><span>${o.endereco||'—'}</span></div>
          <div class="info-item"><label>Data do orçamento</label><span>${fmtDate(dc.data||o.data)}</span></div>
          ${dc.prazo?`<div class="info-item"><label>Prazo estimado</label><span>${dc.prazo}</span></div>`:''}
          ${dc.condicaoPagamento?`<div class="info-item"><label>Forma de pagamento</label><span>${dc.condicaoPagamento}</span></div>`:''}
          <div class="info-item"><label>Status</label><span>${statusMap[status]||status}</span></div>
        </div>
      </div>
    </div>

    <!-- FOTOS DO ANDAMENTO -->
    <div class="card">
      <div class="card-header"><span>📷</span><span class="card-header-title">Fotos do andamento</span></div>
      <div class="card-body">${fotosHtml}</div>
    </div>

    <!-- ORÇAMENTO RESUMO -->
    <div class="card">
      <div class="card-header"><span>💰</span><span class="card-header-title">Resumo financeiro — Orçamento #${o.numero}</span></div>
      <div class="card-body">${orcRows}</div>
    </div>

    <!-- MENSAGENS -->
    <div class="card">
      <div class="card-header"><span>💬</span><span class="card-header-title">Mensagens</span></div>
      <div class="card-body">
        <div class="msg-list" id="msg-list">${msgsHtml}</div>
        <div class="msg-input-row">
          <input id="msg-input" type="text" placeholder="Enviar mensagem ao profissional..." onkeydown="if(event.key==='Enter')enviarMensagem()">
          <button onclick="enviarMensagem()">Enviar</button>
        </div>
      </div>
    </div>

    <!-- ASSINATURA -->
    <div class="card">
      <div class="card-header"><span>✍️</span><span class="card-header-title">Assinatura digital</span></div>
      <div class="card-body">${assinHtml}</div>
    </div>

    <div class="footer">
      Portal do cliente · <a href="https://mestrepro.space" target="_blank">MestrePro</a>
      · Plataforma para pintores profissionais
    </div>
  `;

  // Scroll msg list to bottom
  const ml = document.getElementById('msg-list');
  if (ml) ml.scrollTop = ml.scrollHeight;
}

// ── MENSAGENS ─────────────────────────────────────────────────
async function enviarMensagem() {
  const inp = document.getElementById('msg-input');
  const texto = inp?.value?.trim();
  if (!texto) return;
  inp.value = '';

  const nova = { de: 'cliente', texto, em: new Date().toISOString() };
  _msgs.push(nova);

  // Atualiza a lista localmente
  const ml = document.getElementById('msg-list');
  if (ml) {
    const el = document.createElement('div');
    el.className = 'msg cliente';
    el.innerHTML = `<div>${texto}</div><div class="msg-meta">Você · agora</div>`;
    ml.appendChild(el);
    ml.scrollTop = ml.scrollHeight;
  }

  // Persiste no Supabase
  try {
    await _sb.from('orcamentos').update({ portal_mensagens: _msgs }).eq('id', _portalData.id);
  } catch(e) { console.warn('[MestrePro] Erro ao salvar mensagem:', e); }
}

// ── LIGHTBOX ──────────────────────────────────────────────────
function openLb(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lb-overlay').classList.add('open');
}
function closeLb() {
  document.getElementById('lb-overlay').classList.remove('open');
  document.getElementById('lb-img').src = '';
}

// ── ERRO ──────────────────────────────────────────────────────
function showErro(titulo, msg) {
  document.getElementById('main-content').innerHTML = `
    <div style="text-align:center;padding:60px 20px">
      <div style="font-size:48px;margin-bottom:12px">😕</div>
      <h2 style="font-size:18px;margin-bottom:8px">${titulo}</h2>
      <p style="font-size:13px;color:var(--text2)">${msg}</p>
    </div>`;
}

init();
</script>
</body>
</html>
